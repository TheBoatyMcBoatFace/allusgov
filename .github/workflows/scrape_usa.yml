name: USA Scraping рџ¦…

on:
  schedule:
    - cron: "0 0 * * *" # Run daily at 00:00 UTC
  workflow_dispatch:

jobs:
  scrape_usagov:
    name: Scrape USA.gov
    runs-on: ubuntu-latest

    steps:
      - name: рџ› пёЏ Check out repository
        uses: actions/checkout@v3

      - name: рџђЌ Set up Python environment
        uses: actions/setup-python@v4
        with:
          python-version: 3.x

      - name: рџ“¦ Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: рџЏ›пёЏ Run Usagov script
        run: |
          cd spiders
          python usagov.py

      - name: рџ“Љ Compare & Upload agency data
        uses: theboatymcboatface/allusgov/.github/workflows/compare_and_upload.yml@main
        with:
          agency_name: "USA"
          agency_data_path: "out/usagov.json"
